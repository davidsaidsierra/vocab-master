<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light only">
    <title>VocabMaster</title>
    <!-- Critical inline styles (run before any cached CSS) -->
    <style>
        :root { color-scheme: light only !important; }
        html { background-color: #f5f5f7 !important; color-scheme: light only !important; }
        body { background-color: #f5f5f7 !important; color: #1d1d1f !important; }
    </style>
    <!-- Tailwind CSS (Play CDN — dev only) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 400: '#3b82f6', 500: '#0071e3', 600: '#0077ed', 700: '#0058b0' },
                    }
                }
            }
        }
    </script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/styles.css?v=2">
</head>
<body class="min-h-screen flex">

    <!-- ── Sidebar ──────────────────────────────────────── -->
    <nav id="sidebar" class="w-64 flex flex-col fixed h-full z-30">
        <div class="p-6" style="border-bottom:1px solid var(--border)">
            <h1 class="text-xl font-bold">
                ✦ VocabMaster
            </h1>
            <p class="text-xs mt-1" style="color:var(--text-tertiary)">Personal Vocabulary Tracker</p>
        </div>
        <div class="flex-1 p-4 space-y-1" id="nav-links">
            <a href="#/dashboard" class="nav-link active" data-page="dashboard">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
                Dashboard
            </a>
            <a href="#/words" class="nav-link" data-page="words">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
                My Words
            </a>
            <a href="#/add" class="nav-link" data-page="add">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                Add Word
            </a>
            <a href="#/review" class="nav-link" data-page="review">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
                Review
            </a>
            <a href="#/summary" class="nav-link" data-page="summary">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9h6m-6 4h4"/></svg>
                Quick Summary
            </a>
            <a href="#/categories" class="nav-link" data-page="categories">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A2 2 0 013 12V7a4 4 0 014-4z"/></svg>
                Categories
            </a>
        </div>
        <div class="p-4" style="border-top:1px solid var(--border)">
            <div class="text-xs text-center" style="color:var(--text-quaternary)">VocabMaster v1.0</div>
        </div>
    </nav>

    <!-- ── Main content ─────────────────────────────────── -->
    <main id="app" class="flex-1 ml-64 p-8 overflow-y-auto">
        <!-- Pages are rendered here by the JS router -->
    </main>

    <!-- ── JavaScript modules ───────────────────────────── -->
    <script type="module" src="/static/js/app.js"></script>
</body>
</html>
